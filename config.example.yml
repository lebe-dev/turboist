# IANA timezone for day part calculations (e.g. "Europe/Moscow", "America/New_York").
# Overrides browser-detected timezone on the frontend.
# Default: UTC
timezone: "Europe/Moscow"

# Todoist API polling interval. Format: Go duration (5s, 30s, 1m, ...)
# Default: 30s
poll_interval: "30s"

# Project tasks — tasks tagged with this label are treated as projects.
project:
  label: "проект"

# Contexts — named filter sets for tasks.
# Each context has a unique id used in query params (?context=health).
# All conditions within a single context are combined with AND.
# Multiple values within an array are combined with OR.
contexts:
  - id: health
    display_name: "Здоровье"
    color: green
    filters:
      # Filter by Todoist labels (OR between items)
      labels: ["здоровье"]

  - id: dev
    display_name: "Разработка"
    color: "#FF5733"
    inherit_labels: false
    filters:
      # Filter by Todoist project names (OR between items)
      projects: ["Проекты"]
      # Filter by section names within a project (OR between items)
      sections: ["Секция - Разработка"]
      # Filter by Todoist labels (OR between items)
      labels: ["проект"]

  - id: work
    display_name: "Работа"
    color: "#3B82F6"
    inherit_labels: true
    filters:
      labels: ["работа"]

# Label behavior overrides.
# Only labels that need non-default behavior should be listed here.
# inherit_to_subtasks: whether this label is inherited when creating subtasks (default: true)
labels:
  - name: "проект"
    inherit_to_subtasks: false
  - name: "эта неделя"
    inherit_to_subtasks: false
  - name: "backlog"
    inherit_to_subtasks: false

# Label used to identify "projects" in the project list view.
# Tasks with this label appear in the project picker dropdown.
# Default: empty (feature disabled)
projects_label: "проект"

# Tasks for the current week
weekly:
  # Todoist label that marks tasks for the current week
  label: "эта неделя"
  # Maximum number of tasks per week (used for the progress bar and warnings)
  max_tasks: 15

# Backlog tasks
backlog:
  # Todoist label for backlog tasks
  label: "backlog"
  # Sort order within backlog. Options: priority, due_date, content, added_at (default: added_at)
  task_sort: "added_at"
  # Maximum tasks shown in the backlog view (default: 20)
  max_limit: 20

# Inbox overflow — when inbox task count exceeds max_limit, the UI shows
# a quick-add button that creates a task with overflow_task_content for today.
inbox:
  # Maximum number of inbox tasks before the overflow button appears (default: 10)
  max_limit: 10
  # Content of the auto-created task (default: "Разобрать Входящие")
  overflow_task_content: "Разобрать Входящие"

# Task sorting. Options: priority, due_date, content, added_at
# Default: priority (highest first, then by due date)
task_sort: "priority"

# Maximum number of pinned tasks in the sidebar (default: 5)
max_pinned: 5

# Tasks for today (filtered by due date)
today:
  # Include overdue tasks (due date before today) in the "Today" view
  include_overdue: true
  # Maximum length (in characters) for day part notes (default: 200)
  max_day_part_note_length: 200
  # Day parts: split today's tasks into time-based sections.
  # Tasks are assigned to sections via Todoist labels.
  # Omit or leave empty to disable sectioning.
  day_parts:
    - label: "утро"
      start: 8
      end: 12
    - label: "день"
      start: 12
      end: 16
    - label: "вечер"
      start: 16
      end: 23

# Tasks for tomorrow (filtered by due date)
tomorrow: {}

# Completed tasks view
completed:
  # How many days back to show completed tasks (default: 3)
  days: 3

# Quick capture — save ideas as subtasks under a parent task
quick_capture:
  title: "Inbox"

# Auto-labels: automatically add labels when the task title contains the mask substring.
# Tags appear in real time while typing and are visually distinct from manually chosen labels.
# The user can remove an auto-label before submitting; it will not reappear for that entry.
# mask        — substring to look for in the task title.
# label       — Todoist label name to attach when the mask is found.
# ignore_case — case-insensitive matching (default: true).
auto_labels:
  - mask: "купить"
    label: "покупки"
  - mask: "встреча"
    label: "работа"
  - mask: "созвон"
    label: "работа"
  - mask: "Проект -"
    label: "проект"
    ignore_case: false

# Label-to-project mapping: автоматически перемещает корневые задачи в проекты
# Todoist на основе их меток. Первая совпавшая метка побеждает.
# Задачи без подходящей метки перемещаются в Inbox.
# Подзадачи (с родителем) не затрагиваются.
# ⚠️ МАССОВАЯ ОПЕРАЦИЯ: перемещает задачи между проектами автоматически.
# enabled: false по умолчанию — установите true для активации.
label_project_map:
  enabled: false
  mappings:
    - label: "здоровье"
      project: "Личное"
      section: "Здоровье"  # optional: move to specific section within project
    - label: "работа"
      project: "Работа"

# Auto-remove: автоматически удаляет задачи после истечения TTL.
# TTL отсчитывается с момента первого обнаружения метки в кеше.
# Таймер сбрасывается при перезапуске приложения.
# Защита: min_ttl валидирует TTL правил, max_per_tick ограничивает удаления за тик,
# max_percent включает circuit breaker при слишком большом количестве совпадений.
# ⚠️ МАССОВАЯ ОПЕРАЦИЯ: автоматически удаляет задачи.
# enabled: false по умолчанию — установите true для активации.
auto_remove:
  enabled: false
  min_ttl: "1h"
  max_per_tick: 1
  max_percent: 10
  rules:
    - label: "срочное"
      ttl: "24h"
    - label: "горит"
      ttl: "4h"
