# IANA timezone for day-part calculations (e.g. "Europe/Moscow", "America/New_York").
timezone: "Europe/Moscow"

# Maximum number of pinned tasks/projects shown in the sidebar (separately for each kind).
max-pinned: 5

weekly:
  # Maximum number of tasks with plan_state = 'week'.
  limit: 30

backlog:
  # Maximum number of tasks with plan_state = 'backlog'.
  limit: 30

inbox:
  # When inbox task count exceeds this threshold, the UI surfaces a warning
  # plus a quick-add button that creates the task below for today.
  warn-threshold: 10
  overflow-task:
    title: "Разобрать Входящие"
    priority: "medium"

# Day-part boundaries (hours 0–24, end exclusive). Must not overlap.
day-parts:
  morning:
    start: 9
    end: 13
  afternoon:
    start: 13
    end: 17
  evening:
    start: 17
    end: 22
