# Todoist API polling interval. Format: Go duration (5s, 30s, 1m, ...)
# Default: 30s
poll_interval: "30s"

# Contexts — named filter sets for tasks.
# Each context has a unique id used in query params (?context=health).
# All conditions within a single context are combined with AND.
# Multiple values within an array are combined with OR.
contexts:
  - id: health
    display_name: "Здоровье"
    filters:
      labels: ["здоровье"]

  - id: dev
    display_name: "Разработка"
    filters:
      projects: ["Проекты"]
      sections: ["Категория - Разработка"]
      labels: ["проект"]

  - id: work
    display_name: "Работа"
    filters:
      labels: ["работа"]

# Tasks for the current week
weekly:
  label: "эта неделя"
  max_tasks: 15

# Tasks for the next week
next_week:
  label: "след неделя"

# Tasks for today (by due date)
today:
  include_overdue: true  # also show overdue tasks

# Tasks for tomorrow (by due date)
tomorrow: {}

# Auto-expire
auto_expire:
  - label: "срочное"
    ttl: "24h"
  - label: "горит"
    ttl: "4h"
